<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approvals - Samay</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4338ca">
</head>
<body>
<div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar-el"></aside>
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="hamburger" onclick="openSidebar()" aria-label="Open navigation">&#9776;</button>
        <div class="topbar-title">Approvals</div>
      </div>
      <div class="topbar-actions">
        <a href="/module-select.html" class="btn btn-ghost btn-sm"><span class="btn-symbol" aria-hidden="true">⇆</span><span class="btn-label">Modules</span></a>
      </div>
    </header>
    <div class="page-content">

      <!-- ROLE CONTEXT BANNER -->
      <div id="role-banner" style="margin-bottom:14px;"></div>

      <!-- FILTERS -->
      <div class="card" style="margin-bottom:16px;">
        <div class="filter-toolbar">
          <div class="form-group filter-field"><label class="form-label">From</label><input class="form-control" type="date" id="filter-from"></div>
          <div class="form-group filter-field"><label class="form-label">To</label><input class="form-control" type="date" id="filter-to"></div>
          <div class="form-group filter-field">
            <label class="form-label">Staff</label>
            <select class="form-control" id="filter-staff"><option value="">All</option></select>
          </div>
          <div class="filter-toolbar-actions">
            <button class="btn btn-primary" onclick="loadEntries()">Filter</button>
            <button class="btn btn-ghost btn-sm" onclick="approveAll()">Approve All</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div><div class="card-title">Pending Review <span id="pending-count" style="color:var(--accent);"></span></div></div>
          <label class="mobile-selection-toggle" style="font-size:12px;color:var(--text-muted);cursor:pointer;">
            <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)"> Select All
          </label>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin:-4px 0 14px;">
          <button class="btn btn-success btn-sm" id="btn-approve-selected" onclick="approveSelected()" disabled>Approve</button>
          <button class="btn btn-danger btn-sm" id="btn-reject-selected" onclick="openRejectModal()" disabled>Reject</button>
        </div>
        <div class="mobile-sticky-actions" style="display:none;" id="approvals-sticky-actions">
          <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;">
            <button class="btn btn-success btn-sm" type="button" onclick="approveSelected()">Approve</button>
            <button class="btn btn-danger btn-sm" type="button" onclick="openRejectModal()">Reject</button>
          </div>
        </div>
        <div class="table-wrapper">
            <table class="mobile-stack-table">
            <thead><tr><th></th><th>Date</th><th>Staff</th><th class="hide-mobile">Client</th><th>Task</th><th>Hrs</th><th class="hide-mobile">Classification</th><th class="hide-mobile">Notes</th></tr></thead>
            <tbody id="entries-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-items">
    <a class="bottom-nav-item" href="/dashboard.html"><span class="bn-icon" aria-hidden="true">&#8962;</span>Home</a>
    <a class="bottom-nav-item" href="/timesheet.html"><span class="bn-icon" aria-hidden="true">&#9716;</span>Log</a>
    <a class="bottom-nav-item" href="/my-timesheets.html"><span class="bn-icon" aria-hidden="true">&#9636;</span>Mine</a>
    <a class="bottom-nav-item active" href="/approvals.html"><span class="bn-icon" aria-hidden="true">&#10003;</span>Approve</a>
  </div>
</nav>

<!-- REJECT MODAL -->
<div class="modal-overlay" id="reject-modal">
  <div class="modal">
    <div class="modal-header"><div class="modal-title">Reject Entries</div><button class="modal-close" onclick="closeModal('reject-modal')" aria-label="Close reject modal">&times;</button></div>
    <div class="form-group">
      <label class="form-label">Rejection Reason *</label>
      <textarea class="form-control" id="rejection-reason" rows="3" placeholder="Reason for rejection..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" style="flex:1;justify-content:center;" onclick="rejectSelected()">Reject</button>
      <button class="btn btn-ghost" onclick="closeModal('reject-modal')">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
requireAuth();
if (!hasPermission('approvals.view_manager_queue') && !hasPermission('approvals.view_partner_queue')) window.location.href = '/dashboard.html';
document.getElementById('sidebar-el').innerHTML = SIDEBAR_HTML();
buildSidebar();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

const user = getUser();
const normalizeRole = role => String(role || '').trim().toLowerCase();
const canViewManagerQueue = hasPermission('approvals.view_manager_queue');
const activeApprovalStage = canViewManagerQueue ? 'manager' : null;
const requiredStatus = 'pending_approval';
const banners = {
  manager: { cls:'alert-success', txt:'<strong>Approvals:</strong> Review article timesheets. Once approved here, they are fully approved.' }
};
const b = banners[activeApprovalStage];
if (b) document.getElementById('role-banner').innerHTML = `<div class="alert ${b.cls}">${b.txt}</div>`;

const wb = weekBounds();
const APPROVALS_VIEW_STATE_KEY = 'approvals';
const approvalsInitialState = readViewState(APPROVALS_VIEW_STATE_KEY) || {};
document.getElementById('filter-from').value = approvalsInitialState.from || wb.from;
document.getElementById('filter-to').value = approvalsInitialState.to || wb.to;

function persistApprovalsViewState() {
  writeViewState(APPROVALS_VIEW_STATE_KEY, {
    from: document.getElementById('filter-from').value,
    to: document.getElementById('filter-to').value,
    staff: document.getElementById('filter-staff').value
  });
}

async function loadStaff() {
  try {
    const staff = await apiFetch('/staff');
    const sel = document.getElementById('filter-staff');
    const relevant = staff.filter(s => normalizeRole(s.role) === 'article');
    relevant.forEach(s => sel.innerHTML += `<option value="${s.id}">${s.name}</option>`);
    sel.value = approvalsInitialState.staff || '';
    persistApprovalsViewState();
  } catch(e) {}
}
loadStaff();

async function loadEntries() {
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  const uid = document.getElementById('filter-staff').value;
  persistApprovalsViewState();
  let url = `/timesheets?status=${requiredStatus}&from=${from}&to=${to}`;
  if (uid) url += `&user_id=${uid}`;
  const tbody = document.getElementById('entries-tbody');
  tbody.innerHTML = `<tr><td colspan="8">${renderEmptyState({ icon: '⏳', title: 'Loading approvals', subtitle: 'Checking for timesheets waiting on your review.' })}</td></tr>`;
  try {
    const entries = await apiFetch(url);
    document.getElementById('pending-count').textContent = entries.length ? `(${entries.length} pending)` : '(none)';
    if (!entries.length) {
      tbody.innerHTML = `<tr><td colspan="8">${renderEmptyState({ icon: '✅', title: 'All clear', subtitle: 'There are no pending approvals in this date range.' })}</td></tr>`;
      document.getElementById('select-all').checked = false;
      updateSelectionActions();
      return;
    }
    tbody.innerHTML = entries.map(e => `
    <tr>
      <td><input type="checkbox" class="entry-cb" value="${e.id}" onchange="updateSelectionActions()"></td>
      <td data-label="Date">${fmtDate(e.entry_date)}</td>
      <td data-label="Staff"><strong>${e.staff_name}</strong><div style="font-size:11px;">${roleBadge(e.staff_role||'article')}</div></td>
      <td data-label="Client" class="hide-mobile" style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.client_name||'Internal'}</td>
      <td data-label="Task" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.task_type}</td>
      <td data-label="Hours"><strong>${fmtHours(e.hours)}</strong></td>
      <td data-label="Classification" class="hide-mobile">${workClassificationBadge(e.work_classification, e.billable)}</td>
      <td data-label="Notes" class="hide-mobile" style="max-width:140px;font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.description||'-'}</td>
    </tr>`).join('');
    document.getElementById('select-all').checked = false;
    updateSelectionActions();
  } catch (e) {
    document.getElementById('pending-count').textContent = '(unavailable)';
    tbody.innerHTML = `<tr><td colspan="8">${renderEmptyState({ icon: '⚠', title: 'Approvals could not load', subtitle: 'Please try again in a moment.', actionLabel: 'Retry', action: 'loadEntries()' })}</td></tr>`;
    document.getElementById('select-all').checked = false;
    updateSelectionActions();
    toast(e.message, 'error');
  }
}

function getSelected() { return [...document.querySelectorAll('.entry-cb:checked')].map(c=>c.value); }

function updateSelectionActions() {
  const hasSelection = getSelected().length > 0;
  document.getElementById('btn-approve-selected').disabled = !hasSelection;
  document.getElementById('btn-reject-selected').disabled = !hasSelection;
  const sticky = document.getElementById('approvals-sticky-actions');
  if (sticky) sticky.style.display = hasSelection ? '' : 'none';
}

function toggleSelectAll(v) {
  document.querySelectorAll('.entry-cb').forEach(c => c.checked = v);
  updateSelectionActions();
}

async function approveSelected() {
  const ids = getSelected();
  if (!ids.length) { toast('Select entries first','info'); return; }
  await apiFetch('/timesheets/review',{method:'POST',body:{entry_ids:ids,action:'approve'}});
  toast(`${ids.length} entries approved!`,'success'); loadEntries();
}

async function approveAll() {
  const ids = [...document.querySelectorAll('.entry-cb')].map(c=>c.value);
  if (!ids.length) { toast('No entries to approve','info'); return; }
  await apiFetch('/timesheets/review',{method:'POST',body:{entry_ids:ids,action:'approve'}});
  toast(`All ${ids.length} entries processed!`,'success'); loadEntries();
}

function openRejectModal() {
  if (!getSelected().length) { toast('Select entries to reject','info'); return; }
  document.getElementById('rejection-reason').value='';
  openModal('reject-modal');
}

async function rejectSelected() {
  const ids = getSelected();
  const reason = document.getElementById('rejection-reason').value.trim();
  if (!reason) { toast('Provide a rejection reason','error'); return; }
  await apiFetch('/timesheets/review',{method:'POST',body:{entry_ids:ids,action:'reject',rejection_reason:reason}});
  closeModal('reject-modal'); toast(`${ids.length} entries rejected`,'info'); loadEntries();
}

function openSidebar() { document.getElementById('sidebar-el').classList.add('open'); document.getElementById('sb-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar-el').classList.remove('open'); document.getElementById('sb-overlay').classList.remove('open'); }

ensureMasterDataLoaded().catch(() => {}).finally(loadEntries);
document.addEventListener('change', e => {
  if (e.target.matches('#filter-from, #filter-to, #filter-staff')) persistApprovalsViewState();
});
</script>
</body>
</html>
