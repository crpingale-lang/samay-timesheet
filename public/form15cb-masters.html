<script src="/js/app.js"></script>
<script>
requireAuth();
document.getElementById('sidebar-el').innerHTML = FORM15CB_SIDEBAR_HTML();
buildSidebar();

const API = '/api/form15cb';
const token = getToken();
const H = { 'Authorization': `Bearer ${token}` };
const HJ = { ...H, 'Content-Type':'application/json' };

// Tab switching
const TABS = ['partners','remitters','remittees','banks'];
function switchTab(tab) {
  TABS.forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
  });
  document.querySelectorAll('.tab-btn').forEach((btn,i) => {
    btn.classList.toggle('active', TABS[i]===tab);
  });
  loadTab(tab);
}

// Check URL param for initial tab
const urlTab = new URLSearchParams(location.search).get('tab');

// ── Generic helpers ──────────────────────────────────────────────────────
function esc(v) { return (v===null||v===undefined)?'':String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function loadTab(tab) { window['load' + cap(tab)](); }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

async function apiGet(path) {
  const res = await fetch(`${API}/${path}`, { headers: H });
  return res.json();
}
async function apiPost(path, data) {
  const res = await fetch(`${API}/${path}`, { method:'POST', headers:HJ, body:JSON.stringify(data) });
  return res.json();
}
async function apiPut(path, data) {
  const res = await fetch(`${API}/${path}`, { method:'PUT', headers:HJ, body:JSON.stringify(data) });
  return res.json();
}
async function apiDel(path) {
  const res = await fetch(`${API}/${path}`, { method:'DELETE', headers:H });
  return res.json();
}

function actionBtns(id, tab) {
  return `<button class="btn btn-ghost btn-sm" onclick="edit${cap(tab)}('${id}')">Edit</button>
          <button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="del${cap(tab)}('${id}')">Delete</button>`;
}

// ── Partners ─────────────────────────────────────────────────────────────
async function loadPartners() {
  try {
    const items = await apiGet('partners');
    const tb = document.getElementById('partners-body');
    tb.innerHTML = items.length
      ? items.map(p => `<tr>
          <td data-label="CA Name">${esc(p.caName)}</td>
          <td data-label="Membership No">${esc(p.memberNumber)}</td>
          <td data-label="Firm">${esc(p.firmName)}</td>
          <td data-label="Reg No">${esc(p.firmRegNo)}</td>
          <td data-label="Email">${esc(p.email)}</td>
          <td class="action-cell">${actionBtns(p.id,'Partners')}</td></tr>`).join('')
      : '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">👤</div>No partners yet. Add one above.</div></td></tr>';
  } catch(e) { toast('Error loading partners: '+e.message,'error'); }
}
async function savePartner() {
  const id = document.getElementById('partner-edit-id').value;
  const data = {
    caName: document.getElementById('p-caName').value.trim(),
    memberNumber: document.getElementById('p-memberNumber').value.trim(),
    firmName: document.getElementById('p-firmName').value.trim(),
    firmRegNo: document.getElementById('p-firmRegNo').value.trim(),
    email: document.getElementById('p-email').value.trim(),
    pan: document.getElementById('p-pan').value.trim(),
    firmId: document.getElementById('p-firmId').value.trim(),
  };
  if (!data.caName || !data.memberNumber) { toast('CA Name and Membership No are required','error'); return; }
  try {
    if (id) await apiPut(`partners/${id}`, data);
    else    await apiPost('partners', data);
    toast('Partner saved','success'); clearPartnerForm(); loadPartners();
  } catch(e) { toast('Error: '+e.message,'error'); }
}
async function editPartners(id) {
  try {
    const items = await apiGet('partners');
    const p = items.find(x => x.id === id); if (!p) return;
    document.getElementById('partner-edit-id').value = id;
    document.getElementById('p-caName').value       = p.caName || '';
    document.getElementById('p-memberNumber').value = p.memberNumber || '';
    document.getElementById('p-firmName').value     = p.firmName || '';
    document.getElementById('p-firmRegNo').value    = p.firmRegNo || '';
    document.getElementById('p-email').value        = p.email || '';
    document.getElementById('p-pan').value          = p.pan || '';
    document.getElementById('p-firmId').value       = p.firmId || '';
    document.getElementById('partner-form-title').textContent = 'Edit Partner';
    document.getElementById('partner-form-wrap').scrollIntoView({ behavior:'smooth' });
  } catch(e) { toast('Error: '+e.message,'error'); }
}
async function delPartners(id) {
  if (!confirm('Delete this partner?')) return;
  try { await apiDel(`partners/${id}`); toast('Deleted','success'); loadPartners(); }
  catch(e) { toast('Error: '+e.message,'error'); }
}
function clearPartnerForm() {
  ['caName','memberNumber','firmName','firmRegNo','email','pan','firmId'].forEach(f => document.getElementById('p-'+f).value='');
  document.getElementById('partner-edit-id').value='';
  document.getElementById('partner-form-title').textContent='Add Partner / CA';
}

// ── Remitters ─────────────────────────────────────────────────────────────
async function loadRemitters() {
  try {
    const items = await apiGet('remitters');
    const tb = document.getElementById('remitters-body');
    tb.innerHTML = items.length
      ? items.map(r => `<tr>
          <td data-label="Name">${esc(r.name)}</td>
          <td data-label="PAN">${esc(r.pan)}</td>
          <td data-label="City">${esc(r.city)}</td>
          <td data-label="Email">${esc(r.email)}</td>
          <td class="action-cell">${actionBtns(r.id,'Remitters')}</td></tr>`).join('')
      : '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">🏢</div>No remitters yet.</div></td></tr>';
  } catch(e) { toast('Error: '+e.message,'error'); }
}
async function saveRemitter() {
  const id = document.getElementById('remitter-edit-id').value;
  const data = {
    name: document.getElementById('r-name').value.trim(),
    pan:  document.getElementById('r-pan').value.trim(),
    addr1: document.getElementById('r-addr1').value.trim(),
    city: document.getElementById('r-city').value.trim(),
    state: document.getElementById('r-state').value.trim(),
    pin:  document.getElementById('r-pin').value.trim(),
    email: document.getElementById('r-email').value.trim(),
    mobile: document.getElementById('r-mobile').value.trim(),
    status: document.getElementById('r-status').value.trim(),
    firmId: document.getElementById('r-firmId').value.trim(),
  };
  if (!data.name || !data.pan) { toast('Name and PAN are required','error'); return; }
  try {
    if (id) await apiPut(`remitters/${id}`, data);
    else    await apiPost('remitters', data);
    toast('Remitter saved','success'); clearRemitterForm(); loadRemitters();
  } catch(e) { toast('Error: '+e.message,'error'); }
}
async function editRemitters(id) {
  const items = await apiGet('remitters');
  const r = items.find(x => x.id===id); if (!r) return;
  document.getElementById('remitter-edit-id').value = id;
  ['name','pan','addr1','city','state','pin','email','mobile','status','firmId'].forEach(f => {
    const el = document.getElementById('r-'+f); if(el) el.value = r[f==='addr1'?'addr1':f] || '';
  });
  document.getElementById('r-addr1').value = r.addr1||'';
  document.getElementById('remitter-form-title').textContent = 'Edit Remitter';
}
async function delRemitters(id) {
  if (!confirm('Delete this remitter?')) return;
  try { await apiDel(`remitters/${id}`); toast('Deleted','success'); loadRemitters(); }
  catch(e) { toast('Error: '+e.message,'error'); }
}
function clearRemitterForm() {
  ['name','pan','addr1','city','state','pin','email','mobile','status','firmId'].forEach(f => {
    const el = document.getElementById('r-'+f); if(el) el.value='';
  });
  document.getElementById('remitter-edit-id').value='';
  document.getElementById('remitter-form-title').textContent='Add Remitter';
}

async function saveBank() {

  };

    else    await apiPost('banks', data);

async function editBanks(id) {

  document.getElementById('bank-edit-id').value    = id;
  document.getElementById('b-bankName').value      = b.bankName||'';
  document.getElementById('b-ifsc').value          = b.ifsc||'';
  document.getElementById('b-branchName').value    = b.branchName||'';
  document.getElementById('b-bsrCode').value       = b.bsrCode||'';
  document.getElementById('b-city').value          = b.city||'';
  document.getElementById('bank-form-title').textContent = 'Edit Bank';
}
async function delBanks(id) {
  if (!confirm('Delete this bank?')) return;
  try { await apiDel(`banks/${id}`); toast('Deleted','success'); loadBanks(); }
  catch(e) { toast('Error: '+e.message,'error'); }
}
function clearBankForm() {
  ['bankName','ifsc','branchName','bsrCode','city'].forEach(f => {
    const el = document.getElementById('b-'+f); if(el) el.value='';
  });
  document.getElementById('bank-edit-id').value='';
  document.getElementById('bank-form-title').textContent='Add Bank';
}

// ── Init ──────────────────────────────────────────────────────────────────
const initTab = ['partners','remitters','remittees','banks'].includes(urlTab) ? urlTab : 'partners';
switchTab(initTab);
</script>
