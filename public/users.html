<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Samay</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4338ca">
  <style>
    .user-status-filter{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .pill-toggle{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--text-muted);cursor:pointer;background:var(--bg)}
    .pill-toggle input{margin:0}
  </style>
</head>
<body>
<div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar-el"></aside>
  <div class="main-content">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="hamburger" onclick="openSidebar()" aria-label="Open navigation">&#9776;</button>
        <div class="topbar-title">Users</div>
      </div>
      <button class="btn btn-primary btn-sm" id="add-user-btn" onclick="openAddModal()">+ Add User</button>
    </header>

    <div class="page-content">
      <div class="badge-flow" style="margin-bottom:14px;">
        <span style="font-size:12px;color:var(--text-muted);font-weight:600;">Hierarchy:</span>
        <span class="badge badge-partner">Partner</span>
        <span style="font-size:12px;color:var(--text-muted);">-></span>
        <span class="badge badge-manager">Manager</span>
        <span style="font-size:12px;color:var(--text-muted);">-></span>
        <span class="badge badge-article">Article</span>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="search-bar list-search">
            <input class="form-control" type="text" id="user-search" placeholder="Search users..." oninput="queueUserSearch()" style="padding-left:34px;">
            <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;">Search</span>
          </div>
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end;">
            <div class="user-status-filter" id="user-status-filter">
              <label class="pill-toggle"><input type="radio" name="user-status" value="active" checked> Active</label>
              <label class="pill-toggle"><input type="radio" name="user-status" value="inactive"> Inactive</label>
              <label class="pill-toggle"><input type="radio" name="user-status" value="all"> All</label>
            </div>
            <span id="user-count" class="list-count"></span>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="mobile-stack-table">
            <thead><tr><th>Name</th><th>Username</th><th class="hide-mobile">Designation</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>

        <div class="list-pagination">
          <span id="user-page-meta" class="list-page-meta"></span>
          <div class="list-pagination-actions">
            <button class="btn btn-ghost btn-sm" id="user-prev-btn" onclick="changeUserPage(-1)">Previous</button>
            <button class="btn btn-ghost btn-sm" id="user-next-btn" onclick="changeUserPage(1)">Next</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="user-modal">
  <div class="modal staff-modal" style="max-width:860px;width:min(86vw,860px);">
    <div class="modal-header"><div class="modal-title" id="modal-title">Add User</div><button class="modal-close" onclick="closeModal('user-modal')" aria-label="Close user modal">&times;</button></div>
    <form id="user-form">
      <input type="hidden" id="edit-id">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name *</label><input class="form-control" type="text" id="f-name" required placeholder="e.g. Priya Sharma"></div>
        <div class="form-group"><label class="form-label">Username *</label><input class="form-control" type="text" id="f-username" required placeholder="e.g. priya.sharma"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Password *</label><input class="form-control" type="password" id="f-password" placeholder="Leave blank to keep current"></div>
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select class="form-control" id="f-role">
            <option value="article">Article</option>
            <option value="manager">Manager</option>
            <option value="partner">Partner</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Designation</label><input class="form-control" type="text" id="f-designation" placeholder="e.g. Article Assistant"></div>
        <div class="form-group"><label class="form-label">Department</label><input class="form-control" type="text" id="f-department" placeholder="e.g. Audit, Tax"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email ID</label><input class="form-control" type="email" id="f-email" placeholder="e.g. priya@firm.com"></div>
        <div class="form-group"><label class="form-label">Mobile Number</label><input class="form-control" type="tel" id="f-mobile-number" placeholder="e.g. 9876543210"></div>
      </div>
      <div class="form-group" id="active-group" style="display:none;">
        <div class="toggle-row"><label class="toggle-label">Active</label><label class="toggle"><input type="checkbox" id="f-active" checked><span class="toggle-slider"></span></label></div>
      </div>
      <div class="form-group" id="access-group" style="display:none;">
        <label class="form-label">Application Access</label>
        <div class="table-wrapper" style="border:1px solid var(--border);border-radius:10px;">
          <table>
            <thead><tr><th style="width:180px;">Module</th><th>Access Rights</th></tr></thead>
            <tbody id="access-matrix-body"></tbody>
          </table>
        </div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">Grant access per user for users, clients, timesheets, approvals, reports, dashboard, and the firm shell.</div>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;">Save</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal('user-modal')">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
requirePermission('staff.view');
document.getElementById('sidebar-el').innerHTML = FIRM_SIDEBAR_HTML();
buildSidebar();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

const canCreateUser = hasPermission('staff.create');
const canEditUser = hasPermission('staff.edit');
const canManageAccess = hasPermission('access.manage');
let accessCatalog = [];
const REQUIRED_ACCESS_GROUPS = [
  {
    key: 'attendance',
    label: 'Attendance',
    permissions: [
      { key: 'attendance.view_own', label: 'View Own' },
      { key: 'attendance.create_own', label: 'Add Own' },
      { key: 'attendance.view_reports', label: 'View Report' }
    ]
  }
];
const USER_PAGE_SIZE = 50;
let userPage = 1;
let userTotal = 0;
let userHasMore = false;
let userSearchTimer = null;
const USERS_VIEW_STATE_KEY = 'users';
const usersInitialState = readViewState(USERS_VIEW_STATE_KEY) || {};
document.getElementById('user-search').value = usersInitialState.q || '';
document.querySelectorAll('input[name="user-status"]').forEach(input => {
  input.checked = (usersInitialState.status || 'active') === input.value;
});
document.getElementById('add-user-btn').style.display = canCreateUser ? '' : 'none';

function getUserStatusFilter() {
  return document.querySelector('input[name="user-status"]:checked')?.value || 'active';
}

function persistUserViewState(page = userPage) {
  writeViewState(USERS_VIEW_STATE_KEY, {
    q: document.getElementById('user-search').value.trim(),
    status: getUserStatusFilter(),
    page
  });
}

function normalizeAccessCatalog(groups = []) {
  const catalog = new Map(groups.map(group => [group.key, group]));
  REQUIRED_ACCESS_GROUPS.forEach(group => {
    if (!catalog.has(group.key)) catalog.set(group.key, group);
  });
  return [...catalog.values()];
}

function accessCell(permissionKey) {
  return `<label style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--border);border-radius:999px;margin:4px 6px 4px 0;font-size:12px;cursor:pointer;"><input type="checkbox" data-permission="${permissionKey}"><span>${permissionKey.split('.').slice(1).join(' ')}</span></label>`;
}

function renderAccessMatrix(selected = []) {
  const tbody = document.getElementById('access-matrix-body');
  tbody.innerHTML = accessCatalog.map(group => `
      <tr>
        <td><strong>${group.label}</strong></td>
        <td>${group.permissions.map(permission => accessCell(permission.key)).join('')}</td>
      </tr>`).join('');

  selected.forEach(permission => {
    const input = tbody.querySelector(`[data-permission="${permission}"]`);
    if (input) input.checked = true;
  });
}

function collectSelectedPermissions() {
  return [...document.querySelectorAll('#access-matrix-body [data-permission]:checked')].map(el => el.dataset.permission);
}

async function loadAccessCatalog() {
  if (!canManageAccess) return;
  accessCatalog = normalizeAccessCatalog(REQUIRED_ACCESS_GROUPS);
  renderAccessMatrix();
  const result = await apiFetch('/users/access-catalog');
  accessCatalog = normalizeAccessCatalog(result.groups || accessCatalog);
  document.getElementById('access-group').style.display = '';
  renderAccessMatrix();
}

function queueUserSearch() {
  clearTimeout(userSearchTimer);
  userSearchTimer = setTimeout(() => loadUsers(1), 180);
}

function updateUserPager() {
  const start = userTotal ? ((userPage - 1) * USER_PAGE_SIZE) + 1 : 0;
  const end = userTotal ? Math.min(userPage * USER_PAGE_SIZE, userTotal) : 0;
  const statusLabel = getUserStatusFilter();
  const totalLabel = statusLabel === 'active' ? 'active users' : statusLabel === 'inactive' ? 'inactive users' : 'users';
  document.getElementById('user-count').textContent = `${userTotal} ${totalLabel}`;
  document.getElementById('user-page-meta').textContent = userTotal ? `Showing ${start}-${end} of ${userTotal}` : 'No users found';
  document.getElementById('user-prev-btn').disabled = userPage <= 1;
  document.getElementById('user-next-btn').disabled = !userHasMore;
}

function changeUserPage(delta) {
  const nextPage = userPage + delta;
  if (nextPage < 1) return;
  if (delta > 0 && !userHasMore) return;
  loadUsers(nextPage);
}

async function loadUsers(page = 1) {
  const q = document.getElementById('user-search').value.trim();
  const status = getUserStatusFilter();
  persistUserViewState(page);
  const params = new URLSearchParams({ page: String(page), page_size: String(USER_PAGE_SIZE) });
  if (q) params.set('q', q);
  if (status) params.set('status', status);
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = `<tr><td colspan="6">${renderEmptyState({ icon: '...', title: 'Loading users', subtitle: 'Refreshing the user directory now.' })}</td></tr>`;
  try {
    const result = await apiFetch(`/users?${params.toString()}`);
    const users = result.items || [];
    userPage = result.page || page;
    userTotal = result.total || users.length;
    userHasMore = !!result.has_more;
    updateUserPager();
    if (!users.length) {
      tbody.innerHTML = `<tr><td colspan="6">${renderEmptyState({ icon: 'U', title: 'No users found', subtitle: q ? 'Try a different search term.' : 'Add your first team member to start assigning access and tracking time.', actionLabel: canCreateUser ? 'Add User' : '', action: canCreateUser ? 'openAddModal()' : '' })}</td></tr>`;
      return;
    }
    tbody.innerHTML = users.map(u => `
    <tr>
      <td data-label="Name">
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0;">${String(u.name || '?').charAt(0).toUpperCase()}</div>
          <strong>${u.name}</strong>
        </div>
      </td>
      <td data-label="Username"><code style="background:var(--primary-bg);padding:2px 8px;border-radius:6px;font-size:11.5px;color:var(--primary);">${u.username}</code></td>
      <td data-label="Designation" class="hide-mobile" style="font-size:12.5px;color:var(--text-muted);">${u.designation || '-'}</td>
      <td data-label="Role">${roleBadge(u.role)}<div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${(u.permissions || []).length} accesses</div></td>
      <td data-label="Status"><span class="badge ${u.active ? 'badge-approved' : 'badge-draft'}">${u.active ? 'Active' : 'Inactive'}</span></td>
      <td data-label="Action">${canEditUser ? `<button class="btn btn-ghost btn-sm" onclick='editUser(${JSON.stringify(u)})'>Edit</button>` : '<span style="color:var(--text-faint);font-size:12px;">View only</span>'}</td>
    </tr>`).join('');
  } catch (err) {
    userTotal = 0;
    userHasMore = false;
    updateUserPager();
    tbody.innerHTML = `<tr><td colspan="6">${renderEmptyState({ icon: '!', title: 'User directory could not load', subtitle: 'Please try again. If the issue continues, refresh the page.', actionLabel: 'Retry', action: 'loadUsers()' })}</td></tr>`;
    toast(err.message, 'error');
  }
}

function openAddModal() {
  if (!canCreateUser) return;
  document.getElementById('edit-id').value = '';
  document.getElementById('modal-title').textContent = 'Add User';
  document.getElementById('user-form').reset();
  document.getElementById('f-username').readOnly = false;
  document.getElementById('active-group').style.display = 'none';
  document.getElementById('f-password').required = true;
  if (canManageAccess) renderAccessMatrix();
  openModal('user-modal');
}

function editUser(u) {
  if (!canEditUser) return;
  document.getElementById('edit-id').value = u.id;
  document.getElementById('modal-title').textContent = 'Edit User';
  document.getElementById('f-name').value = u.name;
  document.getElementById('f-username').value = u.username;
  document.getElementById('f-username').readOnly = true;
  document.getElementById('f-role').value = u.role;
  document.getElementById('f-designation').value = u.designation || '';
  document.getElementById('f-department').value = u.department || '';
  document.getElementById('f-email').value = u.email || '';
  document.getElementById('f-mobile-number').value = u.mobile_number || '';
  document.getElementById('f-active').checked = !!u.active;
  document.getElementById('f-password').value = '';
  document.getElementById('f-password').required = false;
  if (canManageAccess) renderAccessMatrix(u.permissions || []);
  document.getElementById('active-group').style.display = '';
  openModal('user-modal');
}

document.getElementById('user-form').addEventListener('submit', async e => {
  e.preventDefault();
  const id = document.getElementById('edit-id').value;
  const payload = {
    name: document.getElementById('f-name').value,
    username: document.getElementById('f-username').value,
    role: document.getElementById('f-role').value,
    designation: document.getElementById('f-designation').value,
    department: document.getElementById('f-department').value,
    email: document.getElementById('f-email').value,
    mobile_number: document.getElementById('f-mobile-number').value,
    active: document.getElementById('f-active').checked ? 1 : 0
  };
  if (canManageAccess) payload.permissions = collectSelectedPermissions();
  const pwd = document.getElementById('f-password').value;
  if (!id && !pwd) { toast('Password required for new user', 'error'); return; }
  if (pwd) payload.password = pwd;
  try {
    if (id) await apiFetch(`/users/${id}`, { method: 'PUT', body: payload });
    else await apiFetch('/users', { method: 'POST', body: payload });
    closeModal('user-modal');
    toast('User saved!', 'success');
    loadUsers(id ? userPage : 1);
  } catch (err) {
    toast(err.message, 'error');
  }
});

document.querySelectorAll('input[name="user-status"]').forEach(input => {
  input.addEventListener('change', () => loadUsers(1));
});

function openSidebar(){document.getElementById('sidebar-el').classList.add('open');document.getElementById('sb-overlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar-el').classList.remove('open');document.getElementById('sb-overlay').classList.remove('open');}

loadAccessCatalog().then(() => loadUsers(usersInitialState.page || 1)).catch(err => toast(err.message, 'error'));
</script>
</body>
</html>
