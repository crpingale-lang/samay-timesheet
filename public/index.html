<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samay — Login</title>
  <meta name="description" content="CA Firm Timesheet Management System — Login">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">CA</div>
      <div class="login-title">Samay</div>
      <div class="login-subtitle">Practice Time Management System</div>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>
      <div id="login-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;background:var(--danger-bg);padding:8px 12px;border-radius:6px;border:1px solid #fecaca;"></div>
      <button class="btn btn-primary" type="submit" id="login-btn" style="width:100%;justify-content:center;padding:11px;">
        Sign In →
      </button>
    </form>
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);text-align:center;">
      <strong>Roles:</strong> Partner → Manager → Article
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  const existingUser = getUser();
  const existingTarget = getDefaultLandingPage();
  if (!hasUsableSession() && (getToken() || existingUser)) clearSession();
  if (hasUsableSession() && existingTarget !== '/') window.location.replace(existingTarget);
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('login-error');
    btn.textContent = 'Signing in…'; btn.disabled = true; errEl.style.display = 'none';
    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: { username: document.getElementById('username').value.trim(), password: document.getElementById('password').value }
      });
      setSession(data.token, data.user);
      window.location.replace(getDefaultLandingPage());
    } catch (err) {
      errEl.textContent = err.message; errEl.style.display = 'block';
      btn.textContent = 'Sign In →'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
